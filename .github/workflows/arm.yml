name: Multi-arch Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.2.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as prerelease?'
        required: true
        type: boolean
        default: true

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev wireguard-tools

      - name: Build amd64 binary
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o wireguird_amd64 ./main.go

      - name: Upload amd64 binary
        uses: actions/upload-artifact@v4
        with:
          name: wireguird-amd64-binary
          path: wireguird_amd64
          retention-days: 1

  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev wireguard-tools

      - name: Build arm64 binary
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o wireguird_arm64 ./main.go

      - name: Upload arm64 binary
        uses: actions/upload-artifact@v4
        with:
          name: wireguird-arm64-binary
          path: wireguird_arm64
          retention-days: 1

  package-and-release:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: wireguird-amd64-binary
          path: ./binaries/amd64/

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: wireguird-arm64-binary
          path: ./binaries/arm64/

      - name: Make binaries executable
        run: |
          chmod +x ./binaries/amd64/wireguird_amd64
          chmod +x ./binaries/arm64/wireguird_arm64

      - name: Package amd64 deb
        run: |
          mkdir -p ./packaging/amd64/DEBIAN
          mkdir -p ./packaging/amd64/usr/bin
          mkdir -p ./packaging/amd64/usr/share/applications
          mkdir -p ./packaging/amd64/usr/share/polkit-1/actions
          mkdir -p ./packaging/amd64/usr/share/wireguird/Icon
          
          # Copy binary
          cp ./binaries/amd64/wireguird_amd64 ./packaging/amd64/usr/bin/wireguird
          
          # Copy desktop file
          cp ./deb/usr/share/applications/wireguird.desktop ./packaging/amd64/usr/share/applications/
          
          # Copy policy file
          cp ./deb/usr/share/polkit-1/actions/wireguird.policy ./packaging/amd64/usr/share/polkit-1/actions/
          
          # Copy icons
          cp -r ./Icon/* ./packaging/amd64/usr/share/wireguird/Icon/
          
          # Create control file
          cat > ./packaging/amd64/DEBIAN/control << 'EOF'
          Package: wireguird
          Version: ${{ inputs.version }}
          Architecture: amd64
          Maintainer: UnnoTed
          Depends: wireguard-tools, resolvconf, libayatana-appindicator3-1
          Description: GTK GUI for Wireguard
           A Linux GTK GUI client for Wireguard
          License: MIT
          Homepage: https://github.com/UnnoTed/wireguird
          EOF
          
          # Build deb package
          dpkg-deb --build ./packaging/amd64 wireguird_${{ inputs.version }}_amd64.deb

      - name: Package arm64 deb
        run: |
          mkdir -p ./packaging/arm64/DEBIAN
          mkdir -p ./packaging/arm64/usr/bin
          mkdir -p ./packaging/arm64/usr/share/applications
          mkdir -p ./packaging/arm64/usr/share/polkit-1/actions
          mkdir -p ./packaging/arm64/usr/share/wireguird/Icon
          
          # Copy binary
          cp ./binaries/arm64/wireguird_arm64 ./packaging/arm64/usr/bin/wireguird
          
          # Copy desktop file
          cp ./deb/usr/share/applications/wireguird.desktop ./packaging/arm64/usr/share/applications/
          
          # Copy policy file
          cp ./deb/usr/share/polkit-1/actions/wireguird.policy ./packaging/arm64/usr/share/polkit-1/actions/
          
          # Copy icons
          cp -r ./Icon/* ./packaging/arm64/usr/share/wireguird/Icon/
          
          # Create control file
          cat > ./packaging/arm64/DEBIAN/control << 'EOF'
          Package: wireguird
          Version: ${{ inputs.version }}
          Architecture: arm64
          Maintainer: UnnoTed
          Depends: wireguard-tools, resolvconf, libayatana-appindicator3-1
          Description: GTK GUI for Wireguard
           A Linux GTK GUI client for Wireguard
          License: MIT
          Homepage: https://github.com/UnnoTed/wireguird
          EOF
          
          # Build deb package
          dpkg-deb --build ./packaging/arm64 wireguird_${{ inputs.version }}_arm64.deb

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Release ${{ inputs.version }}
          body: |
            ## Wireguird ${{ inputs.version }}
            
            Multi-architecture release with amd64 and arm64 support.
            
            ### Downloads
            - `wireguird_${{ inputs.version }}_amd64.deb` - For x86_64/amd64 systems
            - `wireguird_${{ inputs.version }}_arm64.deb` - For ARM64 systems (Raspberry Pi, Apple Silicon, etc.)
            
            ### Installation
            ```bash
            # For amd64
            sudo dpkg -i wireguird_${{ inputs.version }}_amd64.deb
            
            # For arm64
            sudo dpkg -i wireguird_${{ inputs.version }}_arm64.deb
